name: Build geoip files
on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod

      - name: Download GeoLite2 CSV
        run: |
          mkdir -p geolite2
          mkdir -p output
          rm -rf ./output/*
          BASE_URL="https://raw.githubusercontent.com/Loyalsoldier/geoip/release"
          curl -L "${BASE_URL}/GeoLite2-Country-Blocks-IPv4.csv" -o ./geolite2/GeoLite2-Country-Blocks-IPv4.csv
          curl -L "${BASE_URL}/GeoLite2-Country-Blocks-IPv6.csv" -o ./geolite2/GeoLite2-Country-Blocks-IPv6.csv
          curl -L "${BASE_URL}/GeoLite2-Country-Locations-en.csv" -o ./geolite2/GeoLite2-Country-Locations-en.csv
          curl -L "${BASE_URL}/GeoLite2-ASN-Blocks-IPv4.csv" -o ./geolite2/GeoLite2-ASN-Blocks-IPv4.csv
          curl -L "${BASE_URL}/GeoLite2-ASN-Blocks-IPv6.csv" -o ./geolite2/GeoLite2-ASN-Blocks-IPv6.csv

      - name: Build geoip files
        run: |
          go build ./
          ./geoip convert -c ./config.json

      - name: Git push assets to "release" branch
        run: |
          cd output || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add .
          git commit -m "Update GeoIP: $(date +%Y%m%d)"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f origin release
