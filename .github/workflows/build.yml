name: Build geoip files
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 4"
  push:
    branches:
      - master
    paths-ignore:
      - ".gitignore"
      - "LICENSE*"
      - "*.md"
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod

      - name: Set variables
        run: |
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "RELEASE_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
        shell: bash

      - name: Download GeoLite2 databases from Mirror
        run: |
          mkdir -p output
          # 使用 jsDelivr 加速下载 P3TERX 维护的官方格式 ZIP 包
          curl -L "https://cdn.jsdelivr.net/gh/P3TERX/GeoLite.mmdb@download/GeoLite2-Country-CSV.zip" -o ./output/GeoLite2-Country-CSV.zip
          curl -L "https://cdn.jsdelivr.net/gh/P3TERX/GeoLite.mmdb@download/GeoLite2-ASN-CSV.zip" -o ./output/GeoLite2-ASN-CSV.zip

      - name: Prepare GeoLite2 databases
        run: |
          mkdir -p geolite2
          # 解压到临时目录
          unzip -o ./output/GeoLite2-Country-CSV.zip -d ./temp_country
          unzip -o ./output/GeoLite2-ASN-CSV.zip -d ./temp_asn
          
          # 查找解压出的 CSV 文件并移动到 geolite2 文件夹
          # 这样写可以无视文件夹里的日期后缀（如 GeoLite2-Country-CSV_20260407）
          find ./temp_country -name "*.csv" -exec mv {} ./geolite2/ \;
          find ./temp_asn -name "*.csv" -exec mv {} ./geolite2/ \;
          
          # 清理临时目录
          rm -rf temp_country temp_asn

      - name: Build geoip files
        run: |
          go build ./
          ./geoip convert -c ./config.json

      - name: Build geoip files
        run: |
          go build ./
          ./geoip convert -c ./config.json

      - name: Generate sha256 checksum
        run: |
          cd ./output || exit 1
          # 为生成的所有规则文件生成校验和
          find . -maxdepth 1 -type f \( -name "*.dat" -o -name "*.srs" -o -name "*.mrs" \) -exec sh -c 'sha256sum "$1" > "$1.sha256sum"' _ {} \;

      - name: Git push assets to "release" branch
        run: |
          cd output || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add -A
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add geoip "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u geoip release

      - name: Upload files to GitHub release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file_glob: true
          file: ./output/*
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}
