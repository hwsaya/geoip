name: Build geoip files
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 4"
  push:
    branches:
      - master
    paths-ignore:
      - ".gitignore"
      - "LICENSE*"
      - "*.md"
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod

      - name: Set variables
        run: |
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "RELEASE_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
        shell: bash

      - name: Download GeoLite2 CSV from sapics
        run: |
          mkdir -p geolite2
          mkdir -p output
          # 下载国家库 CSV
          curl -L "https://raw.githubusercontent.com/sapics/ip-location-db/master/geolite2-country/geolite2-country-ipv4.csv" -o geolite2/GeoLite2-Country-Blocks-IPv4.csv
          curl -L "https://raw.githubusercontent.com/sapics/ip-location-db/master/geolite2-country/geolite2-country-ipv6.csv" -o geolite2/GeoLite2-Country-Blocks-IPv6.csv
          curl -L "https://raw.githubusercontent.com/sapics/ip-location-db/master/geolite2-country/geolite2-country-locations-en.csv" -o geolite2/GeoLite2-Country-Locations-en.csv
          # 下载 ASN 库 CSV
          curl -L "https://raw.githubusercontent.com/sapics/ip-location-db/master/geolite2-asn/geolite2-asn-ipv4.csv" -o geolite2/GeoLite2-ASN-Blocks-IPv4.csv
          curl -L "https://raw.githubusercontent.com/sapics/ip-location-db/master/geolite2-asn/geolite2-asn-ipv6.csv" -o geolite2/GeoLite2-ASN-Blocks-IPv6.csv

      - name: Build geoip files
        run: |
          go build ./
          ./geoip convert -c ./config.json

      - name: Verify mmdb files
        run: |
          cd ./output || exit 1
          go install -v github.com/maxmind/mmdbverify@latest
          # 仅当生成了 mmdb 文件时才校验
          if ls *.mmdb 1> /dev/null 2>&1; then
            for name in $(ls *.mmdb); do
              $(go env GOPATH)/bin/mmdbverify -file ${name}
            done
          fi

      - name: Generate sha256 checksum
        run: |
          cd ./output || exit 1
          # 为所有生成的文件生成校验和
          find . -maxdepth 1 -type f \( -name "*.dat" -o -name "*.mmdb" -o -name "*.srs" -o -name "*.mrs" \) -exec sh -c 'sha256sum "$1" > "$1.sha256sum"' _ {} \;

      - name: Git push assets to "release" branch
        run: |
          cd output || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add -A
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add geoip "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u geoip release

      - name: Upload files to GitHub release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file_glob: true
          file: ./output/*
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}
